<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Pronunciation Analyzer</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f1a; color: #e0e0e0;
        max-width: 800px; margin: 0 auto; padding: 20px;
        min-height: 100vh;
    }

    h1 { color: #4ecca3; font-size: 28px; margin-bottom: 5px; }
    .subtitle { color: #666; margin-bottom: 30px; }

    /* Record button */
    .record-section { text-align: center; margin: 40px 0; }
    .record-btn {
        width: 120px; height: 120px; border-radius: 50%;
        border: 4px solid #e94560; background: transparent;
        cursor: pointer; transition: all 0.3s;
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 40px; color: #e94560;
    }
    .record-btn:hover { background: rgba(233, 69, 96, 0.1); transform: scale(1.05); }
    .record-btn.recording {
        background: #e94560; color: #fff;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4); }
        50% { box-shadow: 0 0 0 20px rgba(233, 69, 96, 0); }
    }
    .record-hint { color: #888; margin-top: 12px; font-size: 14px; }
    .timer { color: #e94560; font-size: 24px; font-weight: bold; margin-top: 8px; display: none; }

    /* Loading */
    .loading { display: none; text-align: center; margin: 30px 0; }
    .loading.active { display: block; }
    .spinner {
        width: 50px; height: 50px; border: 4px solid #16213e;
        border-top-color: #4ecca3; border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { display: none; }
    .results.active { display: block; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
    .stat-card {
        background: #1a1a2e; border-radius: 12px; padding: 16px;
        text-align: center; border: 1px solid #16213e;
    }
    .stat-card .number { font-size: 28px; font-weight: bold; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .c-green { color: #4ecca3; }
    .c-yellow { color: #f0c040; }
    .c-orange { color: #f59e0b; }
    .c-red { color: #e94560; }

    /* Transcript */
    .transcript-box {
        background: #1a1a2e; border-radius: 12px; padding: 24px;
        margin: 20px 0; line-height: 2.8; font-size: 18px;
    }
    .transcript-box h3 { color: #ccc; margin-bottom: 15px; font-size: 16px; }

    .word-wrap { position: relative; display: inline-block; }
    .w { padding: 2px 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .w:hover { transform: scale(1.1); filter: brightness(1.3); }
    .w-green { background: rgba(78,204,163,0.2); color: #4ecca3; }
    .w-yellow { background: rgba(240,192,64,0.2); color: #f0c040; }
    .w-orange { background: rgba(245,158,11,0.25); color: #f59e0b; text-decoration: underline dotted; }
    .w-red { background: rgba(233,69,96,0.3); color: #e94560; text-decoration: underline wavy; }

    /* Popup */
    .popup {
        display: none; position: absolute; bottom: 100%; left: 50%;
        transform: translateX(-50%); margin-bottom: 10px;
        background: #0f3460; border: 1px solid #4ecca3; border-radius: 12px;
        padding: 16px; min-width: 280px; max-width: 350px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100;
        font-size: 14px; line-height: 1.6;
    }
    .popup.active { display: block; animation: popIn 0.2s ease-out; }
    @keyframes popIn { from { opacity:0; transform: translateX(-50%) translateY(5px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    .popup::after {
        content:''; position:absolute; top:100%; left:50%;
        transform: translateX(-50%); border: 8px solid transparent;
        border-top-color: #0f3460;
    }
    .popup-word { font-size: 22px; font-weight: bold; color: #fff; }
    .popup-phonetic { font-size: 16px; color: #4ecca3; margin: 4px 0; font-family: serif; }
    .popup-conf { color: #888; font-size: 13px; }
    .popup-phonemes { font-size: 13px; margin: 6px 0; padding: 8px; background: #1a1a2e; border-radius: 6px; }
    .popup-expected { color: #4ecca3; }
    .popup-actual { color: #f0c040; }
    .popup-issues { color: #e94560; font-size: 12px; margin-top: 4px; }
    .popup-def { color: #aaa; font-size: 13px; margin-top: 8px; border-top: 1px solid #1a1a2e; padding-top: 8px; }
    .popup-buttons { display: flex; gap: 8px; margin-top: 10px; }
    .popup-btn {
        flex: 1; padding: 8px 12px; border: none; border-radius: 8px;
        cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s;
    }
    .btn-correct { background: #4ecca3; color: #0f0f1a; }
    .btn-you { background: #e94560; color: #fff; }
    .popup-close {
        position:absolute; top:8px; right:12px; background:none;
        border:none; color:#666; cursor:pointer; font-size:18px;
    }

    /* Grammar */
    .grammar-box {
        background: #1a1a2e; border-radius: 12px; padding: 20px;
        margin: 20px 0; border: 1px solid #16213e;
    }
    .grammar-box h3 { color: #e94560; margin-bottom: 12px; }
    .grammar-item { padding: 10px 0; border-bottom: 1px solid #16213e; }
    .grammar-item:last-child { border: none; }
    .grammar-msg { color: #f0c040; }
    .grammar-fix { color: #4ecca3; font-size: 13px; }

    /* Fluency */
    .fluency { display: flex; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
    .flu-card {
        background: #16213e; border-radius: 8px; padding: 12px 16px;
        flex: 1; min-width: 120px; text-align: center;
    }
    .flu-card .number { font-size: 20px; font-weight: bold; color: #5dade2; }
    .flu-card .label { font-size: 11px; color: #888; }

    /* New recording btn */
    .new-btn {
        display: block; margin: 30px auto; padding: 14px 32px;
        background: #4ecca3; color: #0f0f1a; border: none;
        border-radius: 10px; font-size: 16px; font-weight: bold;
        cursor: pointer; transition: all 0.2s;
    }
    .new-btn:hover { background: #6fe8c0; transform: scale(1.02); }

    .audio-player { margin: 15px 0; text-align: center; }
    .audio-player audio { width: 100%; }
</style>
</head>
<body>

<h1>🎤 Pronunciation Analyzer</h1>
<p class="subtitle">Запиши свою речь на английском — получи анализ произношения</p>

<div class="record-section" id="recordSection">
    <button class="record-btn" id="recordBtn" onclick="toggleRecord()">🎙</button>
    <div class="record-hint" id="hint">Нажми для записи</div>
    <div class="timer" id="timer">0:00</div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Анализирую произношение...</p>
</div>

<div class="results" id="results">
    <div class="stats" id="statsCards"></div>

    <div class="fluency" id="fluency"></div>

    <div class="audio-player" id="audioPlayer"></div>

    <div class="transcript-box">
        <h3>📝 Транскрипт</h3>
        <div id="transcript"></div>
    </div>

    <div class="grammar-box" id="grammarBox" style="display:none">
        <h3>📖 Грамматика</h3>
        <div id="grammarList"></div>
    </div>

    <button class="new-btn" onclick="resetUI()">🔄 Записать ещё</button>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let seconds = 0;
let currentAudioUrl = null;

const dictCache = {};

async function fetchDict(word) {
    const w = word.toLowerCase().replace(/[^a-z]/g, '');
    if (!w || w.length < 2) return null;
    if (dictCache[w]) return dictCache[w];
    try {
        const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
        if (!resp.ok) return null;
        const data = await resp.json();
        dictCache[w] = data[0];
        return data[0];
    } catch(e) { return null; }
}

async function toggleRecord() {
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(t => t.stop());
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                sendAudio(blob);
            };

            mediaRecorder.start();
            isRecording = true;
            seconds = 0;
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('recordBtn').textContent = '⏹';
            document.getElementById('hint').textContent = 'Нажми для остановки';
            document.getElementById('timer').style.display = 'block';
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        } catch(e) {
            alert('Не удалось получить доступ к микрофону');
        }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        clearInterval(timerInterval);
        document.getElementById('recordBtn').classList.remove('recording');
        document.getElementById('recordBtn').textContent = '🎙';
        document.getElementById('hint').textContent = '';
        document.getElementById('timer').style.display = 'none';
    }
}

async function sendAudio(blob) {
    document.getElementById('recordSection').style.display = 'none';
    document.getElementById('loading').classList.add('active');

    try {
        const resp = await fetch('/api/analyze', {
            method: 'POST',
            body: blob,
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        currentAudioUrl = data.audio_url;
        showResults(data);
    } catch(e) {
        alert('Ошибка анализа: ' + e.message);
        resetUI();
    }
}

function showResults(data) {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('results').classList.add('active');

    // Stats
    const scoreColor = data.overall_score >= 80 ? 'c-green' : data.overall_score >= 60 ? 'c-yellow' : 'c-red';
    document.getElementById('statsCards').innerHTML = `
        <div class="stat-card"><div class="number ${scoreColor}">${data.overall_score.toFixed(0)}</div><div class="label">Общий балл</div></div>
        <div class="stat-card"><div class="number c-green">${data.green}</div><div class="label">🟢 Отлично</div></div>
        <div class="stat-card"><div class="number c-yellow">${data.yellow}</div><div class="label">🟡 Нормально</div></div>
        <div class="stat-card"><div class="number c-orange">${data.orange}</div><div class="label">🟠 Неясно</div></div>
        <div class="stat-card"><div class="number c-red">${data.red}</div><div class="label">🔴 Ошибка</div></div>
    `;

    // Fluency
    document.getElementById('fluency').innerHTML = `
        <div class="flu-card"><div class="number">${data.fluency.duration}с</div><div class="label">Длительность</div></div>
        <div class="flu-card"><div class="number">${data.fluency.words_per_min}</div><div class="label">Слов/мин</div></div>
        <div class="flu-card"><div class="number">${data.fluency.avg_pause}с</div><div class="label">Ср. пауза</div></div>
        <div class="flu-card"><div class="number">${data.total_words}</div><div class="label">Всего слов</div></div>
    `;

    // Audio player
    if (data.audio_url) {
        document.getElementById('audioPlayer').innerHTML = `<audio id="mainAudio" controls src="${data.audio_url}"></audio>`;
    }

    // Transcript with colored words
    const transcript = document.getElementById('transcript');
    transcript.innerHTML = data.words.map(w => {
        const expected = (w.expected_phonemes || []).join(' ');
        const actual = (w.actual_phonemes || []).join(' ');
        const issues = (w.issues || []).join('|');
        
        // Show repetition number if word appears multiple times
        const repetitionLabel = (w.repetition_count > 1) 
            ? `<sup style="color: #888; font-size: 11px;">${w.repetition_index}</sup>` 
            : '';
        
        return `<span class="word-wrap"><span class="w w-${w.color}"
            data-word="${w.word}" data-conf="${w.confidence}"
            data-start="${w.start}" data-end="${w.end}"
            data-score="${w.score}"
            data-expected="${expected}" data-actual="${actual}"
            data-issues="${issues}"
            data-repindex="${w.repetition_index}"
            data-repcount="${w.repetition_count}"
            onclick="showWordPopup(this)">${w.word}${repetitionLabel}</span></span>`;
    }).join(' ');

    // Grammar
    if (data.grammar_errors.length > 0) {
        document.getElementById('grammarBox').style.display = 'block';
        document.getElementById('grammarList').innerHTML = data.grammar_errors.map(e => `
            <div class="grammar-item">
                <div class="grammar-msg">${e.message}</div>
                ${e.replacements.length > 0 ? `<div class="grammar-fix">💡 ${e.replacements.join(', ')}</div>` : ''}
            </div>
        `).join('');
    }

    // Highlight during playback
    const audio = document.getElementById('mainAudio');
    if (audio) {
        audio.addEventListener('timeupdate', () => {
            const t = audio.currentTime;
            document.querySelectorAll('.w[data-start]').forEach(el => {
                const s = parseFloat(el.dataset.start);
                const e = parseFloat(el.dataset.end);
                if (t >= s && t <= e) {
                    el.style.outline = '2px solid rgba(255,255,255,0.5)';
                    el.style.outlineOffset = '2px';
                } else {
                    el.style.outline = 'none';
                }
            });
        });
    }
}

let activePopup = null;

function closePopup() {
    if (activePopup) { activePopup.classList.remove('active'); activePopup = null; }
}

async function showWordPopup(el) {
    closePopup();

    // Play segment
    const audio = document.getElementById('mainAudio');
    const start = parseFloat(el.dataset.start);
    const end = parseFloat(el.dataset.end);
    if (audio && !isNaN(start)) {
        audio.currentTime = Math.max(0, start - 0.15);
        audio.play();
        const check = setInterval(() => {
            if (audio.currentTime >= end + 0.2) { audio.pause(); clearInterval(check); }
        }, 50);
    }

    const wrap = el.closest('.word-wrap');
    let popup = wrap.querySelector('.popup');
    if (!popup) {
        popup = document.createElement('div');
        popup.className = 'popup';
        wrap.appendChild(popup);
    }

    const word = el.dataset.word;
    const score = parseFloat(el.dataset.score).toFixed(0);
    const expected = el.dataset.expected || '';
    const actual = el.dataset.actual || '';
    const issues = el.dataset.issues ? el.dataset.issues.split('|').filter(Boolean) : [];
    const repIndex = parseInt(el.dataset.repindex) || 1;
    const repCount = parseInt(el.dataset.repcount) || 1;

    const repLabel = repCount > 1 ? `<span style="font-size:14px; color:#888;"> (повторение ${repIndex}/${repCount})</span>` : '';

    popup.innerHTML = `<button class="popup-close" onclick="closePopup()">×</button>
        <div class="popup-word">${word}${repLabel}</div>
        <div class="popup-conf">Загрузка...</div>`;
    popup.classList.add('active');
    activePopup = popup;

    const dict = await fetchDict(word);
    let phonetic = '', audioUrl = '', definition = '';

    if (dict) {
        phonetic = dict.phonetic || (dict.phonetics?.[0]?.text) || '';
        for (const p of (dict.phonetics || [])) { if (p.audio) { audioUrl = p.audio; break; } }
        if (dict.meanings?.[0]) {
            const m = dict.meanings[0];
            definition = `<i>${m.partOfSpeech}</i> — ${m.definitions?.[0]?.definition || ''}`;
        }
    }

    const scoreColor = score >= 75 ? '#4ecca3' : score >= 50 ? '#f0c040' : '#e94560';

    let phonemeHtml = '';
    if (expected || actual) {
        phonemeHtml = `<div class="popup-phonemes">
            ${expected ? `<div class="popup-expected">Ожидается: /${expected}/</div>` : ''}
            ${actual ? `<div class="popup-actual">Распознано: /${actual}/</div>` : ''}
            ${issues.length > 0 ? `<div class="popup-issues">⚠️ ${issues.join('<br>⚠️ ')}</div>` : ''}
        </div>`;
    }

    let btns = '';
    if (audioUrl) btns += `<button class="popup-btn btn-correct" onclick="new Audio('${audioUrl}').play()">🔊 Правильно</button>`;
    if (!isNaN(start)) btns += `<button class="popup-btn btn-you" onclick="playWord(${start},${end})">🎤 Как сказали</button>`;

    popup.innerHTML = `
        <button class="popup-close" onclick="closePopup()">×</button>
        <div class="popup-word">${word}${repLabel}</div>
        ${phonetic ? `<div class="popup-phonetic">${phonetic}</div>` : ''}
        <div class="popup-conf" style="color:${scoreColor}">Фонетика: ${score}/100</div>
        ${phonemeHtml}
        ${btns ? `<div class="popup-buttons">${btns}</div>` : ''}
        ${definition ? `<div class="popup-def">${definition}</div>` : ''}
    `;
}

function playWord(start, end) {
    const audio = document.getElementById('mainAudio');
    if (!audio) return;
    audio.currentTime = Math.max(0, start - 0.15);
    audio.play();
    const check = setInterval(() => {
        if (audio.currentTime >= end + 0.2) { audio.pause(); clearInterval(check); }
    }, 50);
}

function resetUI() {
    document.getElementById('recordSection').style.display = '';
    document.getElementById('results').classList.remove('active');
    document.getElementById('loading').classList.remove('active');
    document.getElementById('hint').textContent = 'Нажми для записи';
    document.getElementById('grammarBox').style.display = 'none';
    closePopup();
}

document.addEventListener('click', e => {
    if (!e.target.closest('.word-wrap') && !e.target.closest('.popup')) closePopup();
});
</script>
</body>
</html>
