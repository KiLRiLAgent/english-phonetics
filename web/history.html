<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Practice - История анализов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: white;
            padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .burger {
            font-size: 28px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .burger:hover {
            background: #f5f5f5;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        /* Layout */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 300px;
            background: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            transform: translateX(-100%);
            transition: transform 0.3s;
            overflow-y: auto;
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        
        .session-list {
            padding: 10px;
        }
        
        .session-item {
            padding: 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .session-item:hover {
            background: #f5f5f5;
        }
        
        .session-item.active {
            background: #e3f2fd;
            border-color: #2196F3;
        }
        
        .session-date {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .session-score {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .session-errors {
            font-size: 12px;
            color: #f44336;
            margin-top: 5px;
        }
        
        /* Main content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        
        .analysis-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .score-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .score-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .score-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .error-section {
            margin-top: 30px;
        }
        
        .error-card {
            background: #fff9f9;
            border-left: 6px solid #f44336;
            border-radius: 8px;
            padding: 30px;
            margin: 20px 0;
        }
        
        .error-header {
            font-size: 24px;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 20px;
        }
        
        .timestamp {
            background: #2196F3;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .mistake-box {
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .mistake-text {
            font-size: 18px;
            color: #c62828;
            font-weight: bold;
        }
        
        .correct-text {
            font-size: 18px;
            color: #2e7d32;
            font-weight: bold;
        }
        
        .explanation-section {
            margin: 25px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #444;
            margin-bottom: 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                z-index: 1000;
            }
            
            .score-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="burger" onclick="toggleSidebar()">☰</div>
        <div class="title">🎤 English Practice</div>
    </div>
    
    <!-- Container -->
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">📂 История анализов</div>
            <div class="session-list" id="sessionList">
                <!-- Loaded dynamically -->
            </div>
        </div>
        
        <!-- Main content -->
        <div class="main-content">
            <div class="analysis-card" id="analysisCard">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <h2>Выберите запись из списка</h2>
                    <p style="margin-top: 10px; color: #999;">Нажмите ☰ чтобы открыть меню</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8780';
        let sessions = [];
        let currentSession = null;
        
        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }
        
        // Load sessions from backend
        async function loadSessions() {
            try {
                const response = await fetch(`${API_URL}/history`);
                sessions = await response.json();
                renderSessionList();
            } catch (error) {
                console.error('Failed to load sessions:', error);
                document.getElementById('sessionList').innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #999;">
                        ⚠️ Не удалось загрузить историю
                    </div>
                `;
            }
        }
        
        // Render session list
        function renderSessionList() {
            const list = document.getElementById('sessionList');
            
            if (sessions.length === 0) {
                list.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #999;">
                        Записей пока нет
                    </div>
                `;
                return;
            }
            
            list.innerHTML = sessions.map((session, index) => `
                <div class="session-item ${currentSession === index ? 'active' : ''}" 
                     onclick="loadSession(${index})">
                    <div class="session-date">${formatDate(session.date)}</div>
                    <div class="session-score">${session.score}/100</div>
                    <div class="session-errors">${session.errors} ошибок</div>
                </div>
            `).join('');
        }
        
        // Load specific session
        async function loadSession(index) {
            currentSession = index;
            const session = sessions[index];
            
            try {
                const response = await fetch(`${API_URL}/result/${session.filename}`);
                const result = await response.json();
                renderAnalysis(result);
                renderSessionList(); // Update active state
                
                // Close sidebar on mobile
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            } catch (error) {
                console.error('Failed to load session:', error);
            }
        }
        
        // Render analysis
        function renderAnalysis(result) {
            const card = document.getElementById('analysisCard');
            
            const errors = result.grammar?.errors || [];
            const overallScore = result.overall_score || 0;
            const grammarScore = result.grammar?.score || 0;
            const fluencyWPM = result.fluency?.wpm || 0;
            
            card.innerHTML = `
                <h1>📝 Анализ речи</h1>
                
                <div class="score-panel">
                    <div class="score-box">
                        <div class="score-label">OVERALL</div>
                        <div class="score-value">${overallScore}</div>
                        <div class="score-label">/100</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">GRAMMAR</div>
                        <div class="score-value">${grammarScore}</div>
                        <div class="score-label">/100</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">FLUENCY</div>
                        <div class="score-value">${Math.round(fluencyWPM)}</div>
                        <div class="score-label">WPM</div>
                    </div>
                </div>
                
                <!-- Transcript Section -->
                <div class="transcript-section" style="margin: 30px 0; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <h2 style="margin-bottom: 15px; color: #333;">📝 Транскрипт</h2>
                    <div style="padding: 15px; background: #f8f9fa; border-radius: 8px; line-height: 1.8; color: #333; max-height: 400px; overflow-y: auto;">
                        ${result.transcript || result.full_transcript || 'Транскрипт не найден'}
                    </div>
                    <div style="margin-top: 10px; font-size: 14px; color: #666;">
                        📊 ${result.fluency?.word_count || 0} слов, 
                        ⏱️ ${Math.round((result.fluency?.duration || 0) / 60)} мин
                    </div>
                </div>
                
                ${errors.length > 0 ? `
                    <div class="error-section">
                        <h2>Найденные ошибки (${errors.length})</h2>
                        ${errors.map(err => renderError(err)).join('')}
                    </div>
                ` : `
                    <div style="text-align: center; padding: 40px; color: #4CAF50;">
                        <div style="font-size: 64px;">✅</div>
                        <h2>Ошибок не найдено!</h2>
                        <p>Отличная работа!</p>
                    </div>
                `}
            `;
        }
        
        // Render single error
        function renderError(err) {
            const cambridge = err.cambridge || {};
            const examples = cambridge.examples || [];
            
            return `
                <div class="error-card">
                    <div class="error-header">
                        📌 ${cambridge.title || 'Grammar Error'}
                        ${err.timestamp ? `<span class="timestamp">⏱️ ${formatTime(err.timestamp)}</span>` : ''}
                    </div>
                    
                    <div class="mistake-box">
                        <div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 5px;">Вы сказали:</div>
                            <span class="mistake-text">❌ ${err.context || err.incorrect_text}</span>
                        </div>
                        <div style="font-size: 24px; color: #666;">→</div>
                        <div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 5px;">Правильно:</div>
                            <span class="correct-text">✅ ${err.replacements?.[0] || '...'}</span>
                        </div>
                    </div>
                    
                    ${cambridge.explanation ? `
                        <div class="explanation-section">
                            <div class="section-title">📚 Объяснение</div>
                            <div style="color: #555; line-height: 1.8;">
                                ${cambridge.explanation}
                            </div>
                        </div>
                    ` : ''}
                    
                    ${examples.length > 0 ? `
                        <div class="explanation-section">
                            <div class="section-title">📝 Примеры</div>
                            ${examples.map(ex => `
                                <div style="padding: 12px; margin: 8px 0; border-radius: 6px; 
                                     background: ${ex.startsWith('✅') ? '#e8f5e9' : '#ffebee'}; 
                                     color: ${ex.startsWith('✅') ? '#2e7d32' : '#c62828'};">
                                    ${ex}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    ${cambridge.tip ? `
                        <div style="background: linear-gradient(135deg, #ffd54f 0%, #ffb300 100%); 
                             color: #333; padding: 20px; border-radius: 12px; margin-top: 20px;">
                            ${cambridge.tip}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) {
                return `Сегодня ${date.toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'})}`;
            } else if (date.toDateString() === yesterday.toDateString()) {
                return `Вчера ${date.toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'})}`;
            } else {
                return date.toLocaleDateString('ru', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        }
        
        // Format timestamp
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Load on startup
        loadSessions();
    </script>
</body>
</html>
